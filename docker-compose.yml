# Example: run the OSS Yumi API server (single-user / LAN) with persistent
# user data. Configure models via env vars or run `yumi --setup` on the
# host and copy ~/.yumi into the volume.
#
services:
  yumi:
    build: .
    ports:
      # Host side bound to loopback only — the OSS API has no auth (that's L2's
      # job), so don't expose it on all host interfaces by default. Change to
      # "8000:8000" (or your_lan_ip:8000:8000) to deliberately expose it.
      - "127.0.0.1:8000:8000"
    environment:
      # The container must bind all interfaces so the port mapping can reach it;
      # the host-side binding above is what limits exposure to loopback.
      YUMI_HOST: "0.0.0.0"
      YUMI_LOG_LEVEL: INFO
      # Example overrides (uncomment as needed):
      # YUMI_CHAT_PROVIDER: ollama
      # YUMI_CHAT_MODEL: llama3.2
      # OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - yumi_data:/root/.yumi

volumes:
  yumi_data:
