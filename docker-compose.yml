# Example: run the OSS Yumi API server (single-user / LAN) with persistent
# user data. Configure models via env vars or run `yumi --setup` on the
# host and copy ~/.yumi into the volume.
#
# Multi-tenant deployments (Postgres, multi-user auth, billing, relay)
# require the closed-source `yumi-enterprise` package — not part of OSS.
services:
  yumi:
    build: .
    ports:
      - "8000:8000"
    environment:
      YUMI_LOG_LEVEL: INFO
      # Example overrides (uncomment as needed):
      # YUMI_CHAT_PROVIDER: ollama
      # YUMI_CHAT_MODEL: llama3.2
      # OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - yumi_data:/root/.yumi

volumes:
  yumi_data:
