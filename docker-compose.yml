# Example: run the OSS Kumi API server (single-user / LAN) with persistent
# user data. Configure models via env vars or run `kumi --setup` on the
# host and copy ~/.kumi into the volume.
#
# Multi-tenant deployments (Postgres, multi-user auth, billing, relay)
# require the closed-source `kumi-enterprise` package — not part of OSS.
services:
  kumi:
    build: .
    ports:
      - "8000:8000"
    environment:
      KUMI_LOG_LEVEL: INFO
      # Example overrides (uncomment as needed):
      # KUMI_CHAT_PROVIDER: ollama
      # KUMI_CHAT_MODEL: llama3.2
      # OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - kumi_data:/root/.kumi

volumes:
  kumi_data:
