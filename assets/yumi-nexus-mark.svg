<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Yumi Nexus mark</title>
  <desc id="desc">A warm-to-cool smile-shaped Yumi Nexus brand mark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="70" y1="128" x2="186" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF654F"/>
