      <stop offset="0.78" stop-color="#7462F5"/>
      <stop offset="1" stop-color="#315DFF"/>
    </linearGradient>
    <linearGradient id="leftDot" x1="74" y1="45" x2="92" y2="63" gradientUnits="userSpaceOnUse">
