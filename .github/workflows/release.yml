# Publish the Python package (PyPI) and TypeScript SDK (npm) on a version tag.
#
# PyPI uses Trusted Publishing (OIDC) — NO API token. The token is replaced by a
# short-lived OIDC credential minted per run, so there is no long-lived secret to
# leak or rotate. This requires two one-time setup steps by the repo owner:
#   1. On PyPI (and test.pypi.org): add a "Trusted Publisher" for this repo with
#      workflow file `release.yml` and the matching environment name below.
#   2. In GitHub repo Settings -> Environments: create `pypi` and `testpypi`.
# Run the workflow manually (workflow_dispatch) with target=testpypi first to
# rehearse against TestPyPI; push a `v*` tag to release to real PyPI.
#
# npm still uses the NPM_TOKEN repo secret.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Python publish target"
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    # Tag push -> real PyPI. Manual run -> whichever target was chosen.
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify package versions are synchronized
        run: python tools/check_versions.py

      - name: Verify package versions match the release tag
        if: ${{ github.event_name == 'push' }}
        run: python tools/check_versions.py --tag "${GITHUB_REF_NAME}"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail the run if this version was already uploaded (e.g. a manual
          # twine upload, or a re-run). Trusted Publishing must be configured on
          # PyPI for this repo (see the header comment) for the upload itself.
          skip-existing: true

  publish-npm:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    # Only publish npm on a real tag release, not on manual TestPyPI rehearsals.
    if: ${{ github.event_name == 'push' }}
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: yumi/sdk/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify package versions match the release tag
        run: python ../../../tools/check_versions.py --tag "${GITHUB_REF_NAME}"

      - name: Install and publish
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm ci && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
