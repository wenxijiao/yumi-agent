# Publish Python (PyPI) and TypeScript (npm) packages when a version tag is pushed.
# Requires repository secrets: PYPI_API_TOKEN, NPM_TOKEN. The `secrets` context is
# not available in `if:` conditions (at any level), so each secret is surfaced as a
# job-level `env` var and the publish step is guarded on that env var instead.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: yumi/sdk/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install and publish
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm ci && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
