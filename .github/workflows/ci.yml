name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall yumi

      - name: Ruff
        run: ruff check yumi tests tools && ruff format --check yumi tests tools

      - name: Run pytest
        run: python -m pytest

  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Pyright
        run: python -m pyright yumi tests

  standalone-install:
    name: Standalone install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify package versions are synchronized
        run: python tools/check_versions.py

      - name: Build sdist + wheel
        run: python -m pip install --upgrade pip build twine && python -m build

      - name: Twine check (PyPI metadata is renderable)
        run: python -m twine check dist/*

      - name: Install wheel into a clean venv and smoke-test
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/yumi_agent-*.whl
          /tmp/clean/bin/python -c "import yumi; from yumi.core.platform.runtime import get_default_runtime; from yumi.core.features.chat.service import ChatTurnService; print('standalone import OK')"
          /tmp/clean/bin/yumi --help

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yumi/sdk/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: yumi/sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  cpp:
    name: C++ SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S yumi/sdk/cpp -B yumi/sdk/cpp/build -DYUMI_USE_TLS=OFF

      - name: Build C++ SDK
        run: cmake --build yumi/sdk/cpp/build --parallel

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yumi/sdk/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Test
        run: go test ./...

  swift:
    name: Swift SDK
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build
        working-directory: yumi/sdk/swift
        run: swift build

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package
        working-directory: yumi/sdk/java
        run: mvn -B -q package -DskipTests

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: yumi/sdk/rust
        run: cargo check

  kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build
        working-directory: yumi/sdk/kotlin
        run: gradle build -q

  dart:
    name: Dart SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Analyze
        working-directory: yumi/sdk/dart
        run: dart pub get && dart analyze

  csharp:
    name: C# SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build
        working-directory: yumi/sdk/csharp
        run: dotnet build -c Release

  coverage:
    name: Coverage (yumi.core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      # Coverage spans the whole core package (platform + features + api) so
      # regressions in any subsystem are visible. The run is reported but not
      # gated on a threshold yet; tighten with --cov-fail-under once the
      # baseline stabilises.
      - name: Pytest with coverage
        run: python -m pytest --cov=yumi.core --cov-report=term-missing -q
