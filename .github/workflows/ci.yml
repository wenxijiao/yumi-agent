name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,providers]"

      - name: Compile Python sources
        run: python -m compileall kumi

      - name: Ruff
        run: ruff check kumi tests && ruff format --check kumi tests

      - name: Run pytest
        run: python -m pytest

  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,providers]"

      - name: Pyright
        run: python -m pyright kumi tests

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kumi/sdk/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kumi/sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  cpp:
    name: C++ SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S kumi/sdk/cpp -B kumi/sdk/cpp/build -DKUMI_USE_TLS=OFF

      - name: Build C++ SDK
        run: cmake --build kumi/sdk/cpp/build --parallel

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kumi/sdk/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Test
        run: go test ./...

  swift:
    name: Swift SDK
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build
        working-directory: kumi/sdk/swift
        run: swift build

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package
        working-directory: kumi/sdk/java
        run: mvn -B -q package -DskipTests

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: kumi/sdk/rust
        run: cargo check

  kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build
        working-directory: kumi/sdk/kotlin
        run: gradle build -q

  dart:
    name: Dart SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Analyze
        working-directory: kumi/sdk/dart
        run: dart pub get && dart analyze

  csharp:
    name: C# SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build
        working-directory: kumi/sdk/csharp
        run: dotnet build -c Release

  coverage:
    name: Coverage (kumi.core.api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,providers]"

      - name: Pytest with coverage
        run: python -m pytest --cov=kumi.core.api --cov-report=term-missing -q
